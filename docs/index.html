<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PaciFund — Funding Rate Arbitrage on Pacifica</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg0:#0a0b0e;--bg1:#12141a;--bg2:#1a1d26;--bg3:#242834;--bd:#2a2e3a;--bdh:#3a3f50;--t0:#f0f1f4;--t1:#b0b4c0;--t2:#6b7084;--gr:#00d68f;--grd:#00d68f22;--rd:#ff6b6b;--rdd:#ff6b6b22;--bl:#5b8def;--bld:#5b8def22;--am:#ffb84d;--amd:#ffb84d22;--fn:'DM Sans',-apple-system,sans-serif;--mo:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg0);color:var(--t0);font-family:var(--fn);font-size:14px;-webkit-font-smoothing:antialiased}
a{color:var(--bl);text-decoration:none}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--bd);background:var(--bg1);position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-m{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--bl),var(--gr));display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;color:#fff}
.logo-t{font-size:18px;font-weight:600;letter-spacing:-.3px}
.logo-tag{font-size:11px;color:var(--t2);background:var(--bg3);padding:2px 8px;border-radius:4px}
.hdr-r{display:flex;align-items:center;gap:12px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gr);box-shadow:0 0 6px var(--gr);display:inline-block}
.mn{padding:20px 24px;max-width:1400px;margin:0 auto}

.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.c{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:16px 18px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ct{font-size:12px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}

.sc{padding:14px 18px}
.sl{font-size:11px;color:var(--t2);margin-bottom:4px;letter-spacing:.3px}
.sv{font-size:22px;font-weight:600;font-family:var(--mo);letter-spacing:-.5px}
.ss{font-size:11px;color:var(--t2);margin-top:4px}
.chg{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-family:var(--mo);padding:2px 6px;border-radius:4px;margin-top:5px}
.up{color:var(--gr);background:var(--grd)}.dn{color:var(--rd);background:var(--rdd)}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;color:var(--t2);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd)}
td{padding:10px 12px;border-bottom:1px solid var(--bd)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.mo{font-family:var(--mo);font-size:13px}
.gr{color:var(--gr)}.rd{color:var(--rd)}.bl{color:var(--bl)}.am{color:var(--am)}

.bg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.bg-g{background:var(--grd);color:var(--gr)}.bg-b{background:var(--bld);color:var(--bl)}.bg-a{background:var(--amd);color:var(--am)}

.btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--t0);transition:.15s;font-family:var(--fn)}
.btn:hover{border-color:var(--bdh);background:var(--bg3)}
.btn-g{background:var(--grd);border-color:var(--gr);color:var(--gr)}.btn-g:hover{background:var(--gr);color:#000}
.btn-s{padding:4px 9px;font-size:11px}

.ep{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500}
.ep-p{background:var(--bld);color:var(--bl)}.ep-b{background:var(--amd);color:var(--am)}

.cb{width:56px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.cf{height:100%;border-radius:3px;display:block}

.tbs{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:14px}
.tb{padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;transition:.15s}
.tb:hover{color:var(--t1)}.tb.a{color:var(--t0);border-bottom-color:var(--bl)}

.tgl{position:relative;width:38px;height:20px;cursor:pointer;display:inline-block;vertical-align:middle}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tgl-t{position:absolute;inset:0;background:var(--bg3);border-radius:10px;transition:.2s}
.tgl input:checked+.tgl-t{background:var(--gr)}
.tgl-h{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:.2s;pointer-events:none}
.tgl input:checked~.tgl-h{left:21px}

.chart-box{position:relative;height:240px;margin-top:8px}
.chart-box-sm{position:relative;height:180px;margin-top:8px}
.empty{color:var(--t2);text-align:center;padding:28px}
.lgd{display:flex;gap:14px;font-size:11px;color:var(--t2)}
.lgd span{display:flex;align-items:center;gap:4px}
.lgd i{width:8px;height:3px;border-radius:2px;display:inline-block}

@keyframes pls{0%,100%{opacity:1}50%{opacity:.4}}
.scan{animation:pls 1.5s ease-in-out infinite}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.mn{padding:14px}.hdr{padding:10px 14px;flex-wrap:wrap;gap:8px}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="logo">
    <div class="logo-m">Pf</div>
    <span class="logo-t">PaciFund</span>
    <span class="logo-tag">Demo</span>
  </div>
  <div class="hdr-r">
    <span id="scan-status" style="display:flex;align-items:center;gap:6px">
      <span class="dot"></span>
      <span style="font-size:12px;color:var(--t2)" id="scan-text">Ready</span>
    </span>
    <button class="btn" onclick="doScan()">Scan now</button>
    <span style="font-size:12px;color:var(--t2)">Auto</span>
    <label class="tgl"><input type="checkbox" id="auto-toggle"/><div class="tgl-t"></div><div class="tgl-h"></div></label>
  </div>
</header>

<!-- MAIN -->
<main class="mn">
  <!-- STAT CARDS -->
  <div class="g4">
    <div class="c sc" id="stat-pnl"><div class="sl">Total P&L</div><div class="sv">$0.00</div><div class="chg up">▲ 0%</div></div>
    <div class="c sc" id="stat-fund"><div class="sl">Funding collected</div><div class="sv">$0.00</div><div class="ss">Cumulative income</div></div>
    <div class="c sc" id="stat-exp"><div class="sl">Exposure</div><div class="sv">$0</div><div class="ss">0% of $10K</div></div>
    <div class="c sc" id="stat-sig"><div class="sl">Active signals</div><div class="sv">0</div><div class="ss">0 open positions</div></div>
  </div>

  <!-- CHARTS -->
  <div class="g2">
    <div class="c">
      <div class="ch">
        <span class="ct">P&L history (30d)</span>
        <div class="lgd"><span><i style="background:var(--gr)"></i>P&L</span><span><i style="background:var(--bl)"></i>Funding</span></div>
      </div>
      <div class="chart-box"><canvas id="pnl-chart"></canvas></div>
    </div>
    <div class="c">
      <div class="ch"><span class="ct">Cross-exchange spread (bps)</span></div>
      <div class="chart-box-sm"><canvas id="spread-chart"></canvas></div>
      <div style="margin-top:12px" id="rates-table"></div>
    </div>
  </div>

  <!-- SIGNALS / POSITIONS -->
  <div class="c">
    <div class="tbs">
      <div class="tb a" id="tab-signals" onclick="switchTab('signals')">Signals <span class="bg bg-g" id="sig-count" style="margin-left:5px">0</span></div>
      <div class="tb" id="tab-positions" onclick="switchTab('positions')">Positions <span class="bg bg-b" id="pos-count" style="margin-left:5px">0 open</span></div>
    </div>
    <div id="panel-signals"></div>
    <div id="panel-positions" style="display:none"></div>
  </div>
</main>

<script>
/* ── Data Engine ── */
var PAIRS = ['BTC-PERP','ETH-PERP','SOL-PERP','ARB-PERP','AVAX-PERP'];
var EXS = ['pacifica','binance'];
function R(a,b){return Math.random()*(b-a)+a}
function id(){return Math.random().toString(36).slice(2,10)}

var rates=[], signals=[], positions=[], pnlHistory=[], executedIds={};
var pnlChart=null, spreadChart=null;

function mkRates(){
  var out=[];
  PAIRS.forEach(function(p){EXS.forEach(function(e){
    var rate=R(-0.0005,0.0008);
    out.push({exchange:e,pair:p,rate:rate});
  })});
  return out;
}

function mkSignals(rts){
  var sigs=[];
  PAIRS.forEach(function(p){
    var pac=null,bin=null;
    rts.forEach(function(r){if(r.pair===p&&r.exchange==='pacifica')pac=r;if(r.pair===p&&r.exchange==='binance')bin=r;});
    if(!pac||!bin)return;
    var spread=Math.abs(pac.rate-bin.rate);
    if(spread<0.00005)return;
    var lEx=pac.rate<bin.rate?'pacifica':'binance';
    var sEx=pac.rate<bin.rate?'binance':'pacifica';
    sigs.push({
      id:'sig_'+id(),pair:p,long_exchange:lEx,short_exchange:sEx,
      long_rate:Math.min(pac.rate,bin.rate),short_rate:Math.max(pac.rate,bin.rate),
      spread:spread,spread_pct:(spread*100).toFixed(4)+'%',
      annualized:(spread*3*365*100).toFixed(2)+'%',
      profit8h:+(10000*spread).toFixed(2),
      confidence:+R(.45,.95).toFixed(2),
      size:+R(500,2500).toFixed(0),
      leverage:[1,1.5,2][Math.floor(R(0,3))]
    });
  });
  sigs.sort(function(a,b){return b.spread-a.spread});
  return sigs;
}

function mkPnl(){
  var out=[],cp=0,cf=0;
  for(var i=0;i<30;i++){
    cp+=R(-15,45);cf+=R(2,20);
    var d=new Date();d.setDate(d.getDate()-(30-i));
    out.push({date:d.toLocaleDateString('en',{month:'short',day:'numeric'}),pnl:+cp.toFixed(2),funding:+cf.toFixed(2)});
  }
  return out;
}

function mkPos(){
  var sts=['open','open','open','closed','closed','closed','closed'];
  return sts.map(function(st,i){
    var pair=PAIRS[i%5],pnl=+R(-30,80).toFixed(2),sz=+R(800,3000).toFixed(0);
    return{id:'pos_'+id(),pair:pair,long_exchange:Math.random()>.5?'pacifica':'binance',short_exchange:Math.random()>.5?'binance':'pacifica',size_usd:sz,pnl_usd:pnl,funding:+R(1,25).toFixed(2),ret:((pnl/sz)*100).toFixed(2)+'%',status:st};
  });
}

/* ── Render helpers ── */
function ex(name){return '<span class="ep '+(name==='pacifica'?'ep-p':'ep-b')+'">'+(name==='pacifica'?'Pacifica':'Binance')+'</span>';}
function conf(v){var c=v>.7?'var(--gr)':v>.5?'var(--am)':'var(--rd)';return '<span class="cb"><span class="cf" style="width:'+Math.round(v*100)+'%;background:'+c+'"></span></span> <span class="mo" style="font-size:11px;color:'+c+'">'+Math.round(v*100)+'%</span>';}

/* ── Stats ── */
function updateStats(){
  var openP=positions.filter(function(p){return p.status==='open'});
  var totPnl=0,totFund=0,totExp=0;
  positions.forEach(function(p){totPnl+=p.pnl_usd;totFund+=p.funding});
  openP.forEach(function(p){totExp+=p.size_usd});

  var s1=document.getElementById('stat-pnl');
  s1.innerHTML='<div class="sl">Total P&L</div><div class="sv">$'+totPnl.toFixed(2)+'</div><div class="chg '+(totPnl>=0?'up':'dn')+'">'+(totPnl>=0?'▲':'▼')+' '+((totPnl/10000)*100).toFixed(1)+'%</div>';

  var s2=document.getElementById('stat-fund');
  s2.innerHTML='<div class="sl">Funding collected</div><div class="sv">$'+totFund.toFixed(2)+'</div><div class="ss">+$'+(totFund/30).toFixed(1)+'/day avg</div>';

  var s3=document.getElementById('stat-exp');
  s3.innerHTML='<div class="sl">Exposure</div><div class="sv">$'+totExp.toLocaleString()+'</div><div class="ss">'+((totExp/10000)*100).toFixed(1)+'% of $10K</div>';

  var s4=document.getElementById('stat-sig');
  s4.innerHTML='<div class="sl">Active signals</div><div class="sv">'+signals.length+'</div><div class="ss">'+openP.length+' open positions</div>';

  document.getElementById('sig-count').textContent=signals.length;
  document.getElementById('pos-count').textContent=openP.length+' open';
}

/* ── Rates table ── */
function renderRates(){
  var g={};
  rates.forEach(function(r){if(!g[r.pair])g[r.pair]={};g[r.pair][r.exchange]=r;});
  var html='<table><thead><tr><th>Pair</th><th>Pacifica</th><th>Binance</th><th>Spread</th><th>Annual</th></tr></thead><tbody>';
  Object.keys(g).forEach(function(p){
    var pc=g[p].pacifica?g[p].pacifica.rate:0;
    var bn=g[p].binance?g[p].binance.rate:0;
    var sp=Math.abs(pc-bn),an=sp*3*365*100;
    html+='<tr><td style="font-weight:500">'+p+'</td>';
    html+='<td class="mo '+(pc>=0?'gr':'rd')+'">'+(pc*100).toFixed(4)+'%</td>';
    html+='<td class="mo '+(bn>=0?'gr':'rd')+'">'+(bn*100).toFixed(4)+'%</td>';
    html+='<td class="mo bl">'+(sp*100).toFixed(4)+'%</td>';
    html+='<td class="mo '+(an>10?'gr':'am')+'">'+an.toFixed(1)+'%</td></tr>';
  });
  html+='</tbody></table>';
  document.getElementById('rates-table').innerHTML=html;
}

/* ── Signals table ── */
function renderSignals(){
  var filtered=signals.filter(function(s){return !executedIds[s.id]});
  if(!filtered.length){
    document.getElementById('panel-signals').innerHTML='<div class="empty">No signals above threshold — waiting for spread divergence...</div>';
    return;
  }
  var html='<div style="overflow-x:auto"><table><thead><tr><th>Pair</th><th>Direction</th><th>Spread</th><th>Est. profit/8h</th><th>Confidence</th><th>Size</th><th></th></tr></thead><tbody>';
  filtered.forEach(function(s){
    html+='<tr><td style="font-weight:500">'+s.pair+'</td>';
    html+='<td><span style="font-size:12px"><span class="gr">LONG</span> '+ex(s.long_exchange)+' <span style="color:var(--t2);margin:0 2px">/</span> <span class="rd">SHORT</span> '+ex(s.short_exchange)+'</span></td>';
    html+='<td class="mo bl">'+s.spread_pct+'</td>';
    html+='<td class="mo gr">$'+s.profit8h+'</td>';
    html+='<td>'+conf(s.confidence)+'</td>';
    html+='<td class="mo">$'+s.size+' × '+s.leverage+'x</td>';
    html+='<td><button class="btn btn-g btn-s" onclick="execSignal(\''+s.id+'\')">Execute</button></td></tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('panel-signals').innerHTML=html;
}

/* ── Positions table ── */
function renderPositions(){
  var html='<div style="overflow-x:auto"><table><thead><tr><th>Pair</th><th>Direction</th><th>Size</th><th>P&L</th><th>Funding</th><th>Return</th><th>Status</th></tr></thead><tbody>';
  positions.forEach(function(p){
    html+='<tr><td style="font-weight:500">'+p.pair+'</td>';
    html+='<td><span style="font-size:12px"><span class="gr">L</span> '+ex(p.long_exchange)+' <span style="color:var(--t2)">/</span> <span class="rd">S</span> '+ex(p.short_exchange)+'</span></td>';
    html+='<td class="mo">$'+p.size_usd.toLocaleString()+'</td>';
    html+='<td class="mo '+(p.pnl_usd>=0?'gr':'rd')+'">'+(p.pnl_usd>=0?'+':'')+p.pnl_usd.toFixed(2)+'</td>';
    html+='<td class="mo gr">+$'+p.funding.toFixed(2)+'</td>';
    html+='<td class="mo '+(parseFloat(p.ret)>=0?'gr':'rd')+'">'+p.ret+'</td>';
    html+='<td><span class="bg '+(p.status==='open'?'bg-g':'bg-b')+'">'+p.status+'</span></td></tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('panel-positions').innerHTML=html;
}

/* ── Execute signal ── */
function execSignal(sigId){
  executedIds[sigId]=true;
  var s=null;signals.forEach(function(x){if(x.id===sigId)s=x;});
  if(!s)return;
  positions.unshift({id:'pos_'+id(),pair:s.pair,long_exchange:s.long_exchange,short_exchange:s.short_exchange,size_usd:+s.size,pnl_usd:0,funding:0,ret:'0.00%',status:'open'});
  updateStats();renderSignals();renderPositions();
}

/* ── Tabs ── */
function switchTab(t){
  document.getElementById('tab-signals').className='tb'+(t==='signals'?' a':'');
  document.getElementById('tab-positions').className='tb'+(t==='positions'?' a':'');
  document.getElementById('panel-signals').style.display=t==='signals'?'':'none';
  document.getElementById('panel-positions').style.display=t==='positions'?'':'none';
}

/* ── Charts ── */
function initPnlChart(){
  var ctx=document.getElementById('pnl-chart').getContext('2d');
  pnlChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:pnlHistory.map(function(d){return d.date}),
      datasets:[
        {label:'Funding',data:pnlHistory.map(function(d){return d.funding}),borderColor:'#5b8def',backgroundColor:'rgba(91,141,239,0.08)',borderWidth:1.5,fill:true,tension:.4,pointRadius:0},
        {label:'P&L',data:pnlHistory.map(function(d){return d.pnl}),borderColor:'#00d68f',backgroundColor:'rgba(0,214,143,0.1)',borderWidth:2,fill:true,tension:.4,pointRadius:0}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1d26',borderColor:'#2a2e3a',borderWidth:1,titleColor:'#6b7084',bodyColor:'#f0f1f4',cornerRadius:8,callbacks:{label:function(c){return c.dataset.label+': $'+c.parsed.y.toFixed(2)}}}},
      scales:{x:{ticks:{color:'#6b7084',font:{size:11}},grid:{color:'#242834',drawBorder:false}},y:{ticks:{color:'#6b7084',font:{size:11},callback:function(v){return '$'+v}},grid:{color:'#242834',drawBorder:false}}}
    }
  });
}

function initSpreadChart(){
  var g={};rates.forEach(function(r){if(!g[r.pair])g[r.pair]={};g[r.pair][r.exchange]=r;});
  var labels=[],data=[],colors=[];
  Object.keys(g).forEach(function(p){
    var pc=g[p].pacifica?g[p].pacifica.rate:0;
    var bn=g[p].binance?g[p].binance.rate:0;
    var sp=Math.abs(pc-bn)*10000;
    labels.push(p.replace('-PERP',''));data.push(+sp.toFixed(2));
    colors.push(sp>3?'#00d68f':sp>1?'#ffb84d':'#3a3f50');
  });
  var ctx=document.getElementById('spread-chart').getContext('2d');
  spreadChart=new Chart(ctx,{
    type:'bar',
    data:{labels:labels,datasets:[{label:'Spread',data:data,backgroundColor:colors,borderRadius:4,maxBarThickness:44}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1d26',borderColor:'#2a2e3a',borderWidth:1,bodyColor:'#f0f1f4',cornerRadius:8,callbacks:{label:function(c){return c.parsed.y.toFixed(2)+' bps'}}}},
      scales:{x:{ticks:{color:'#6b7084',font:{size:12}},grid:{display:false}},y:{ticks:{color:'#6b7084',font:{size:11},callback:function(v){return v+'bp'}},grid:{color:'#242834',drawBorder:false}}}
    }
  });
}

function updateSpreadChart(){
  var g={};rates.forEach(function(r){if(!g[r.pair])g[r.pair]={};g[r.pair][r.exchange]=r;});
  var data=[],colors=[];
  Object.keys(g).forEach(function(p){
    var pc=g[p].pacifica?g[p].pacifica.rate:0;
    var bn=g[p].binance?g[p].binance.rate:0;
    var sp=Math.abs(pc-bn)*10000;
    data.push(+sp.toFixed(2));colors.push(sp>3?'#00d68f':sp>1?'#ffb84d':'#3a3f50');
  });
  spreadChart.data.datasets[0].data=data;
  spreadChart.data.datasets[0].backgroundColor=colors;
  spreadChart.update('none');
}

/* ── Scan ── */
function doScan(){
  var el=document.getElementById('scan-status');
  el.classList.add('scan');
  document.getElementById('scan-text').textContent='Scanning...';

  setTimeout(function(){
    rates=mkRates();
    signals=mkSignals(rates);
    updateStats();renderRates();renderSignals();renderPositions();
    updateSpreadChart();
    el.classList.remove('scan');
    var now=new Date();
    document.getElementById('scan-text').textContent='Scan '+now.toLocaleTimeString();
  },500);
}

/* ── Init ── */
pnlHistory=mkPnl();
positions=mkPos();
rates=mkRates();
signals=mkSignals(rates);
updateStats();renderRates();renderSignals();renderPositions();
initPnlChart();initSpreadChart();

setInterval(doScan,30000);
</script>
</body>
</html>
